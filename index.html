<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Proxy Advanced</title>
</head>
<body>
  <h1>Proxy 🔓</h1>

  <input id="url" placeholder="Digite o site">
  <button onclick="go()">Acessar</button>

  <script>
    const worker = "quiet-river-77cb.ryangomesmelo123.workers.dev";

    function encodeUrl(url) {
      return btoa(url);
    }

    function go() {
      let url = document.getElementById("url").value;

      if (!url.startsWith("http")) {
        url = "https://" + url;
      }

      const encoded = encodeUrl(url);

 window.location.href = "/?url=" + encoded;
    }

    // Registrar Service Worker
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js");
    }
  </script>
</body>
</html>
