<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Proxy</title>
</head>
<body>
  <h1>Proxy 🔓</h1>

  <input id="url" placeholder="Digite o site (ex: google.com)">
  <button onclick="go()">Acessar</button>

  <script>
    // URL do seu Cloudflare Worker
    const WORKER = "https://quiet-river-77cb.ryangomesmelo123.workers.dev";

    function go() {
      let url = document.getElementById("url").value.trim();
      if (!url.startsWith("http")) url = "https://" + url;
      window.location.href = WORKER + "?url=" + btoa(url);
    }

    document.getElementById("url").addEventListener("keydown", e => {
      if (e.key === "Enter") go();
    });
  </script>
</body>
</html>
