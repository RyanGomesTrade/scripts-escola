<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Livre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      position: relative;
      background: #0a0a0a;
    }

    /* ── Fundo GIF natureza ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      filter: saturate(0.7) brightness(0.55);
    }

    /* Grain overlay */
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
      opacity: 0.35;
      pointer-events: none;
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      margin: 24px;
      padding: 0;
      background: rgba(10, 10, 10, 0.55);
      backdrop-filter: blur(28px) saturate(140%);
      -webkit-backdrop-filter: blur(28px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-top: 3px solid #e63030;
      border-radius: 4px;
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255,255,255,0.05);
      animation: appear 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
      overflow: hidden;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Faixa vermelha topo */
    .card-stripe {
      background: #e63030;
      padding: 7px 28px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-stripe span {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
    }

    .stripe-circle {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* Corpo do card */
    .card-body {
      padding: 32px 32px 28px;
    }

    /* Título grande */
    .headline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 64px;
      line-height: 0.92;
      letter-spacing: 0.01em;
      color: #fff;
      margin-bottom: 4px;
    }

    .headline .red {
      color: #e63030;
    }

    .tagline {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 28px;
      margin-top: 8px;
    }

    /* Divider manifesto */
    .manifesto {
      border-left: 2px solid #e63030;
      padding: 8px 14px;
      margin-bottom: 28px;
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      font-weight: 300;
      line-height: 1.7;
      font-style: italic;
    }

    /* Label */
    .input-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 8px;
      display: block;
    }

    /* Input */
    input[type="text"] {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 3px;
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 12px;
    }

    input[type="text"]::placeholder {
      color: rgba(255,255,255,0.2);
    }

    input[type="text"]:focus {
      background: rgba(255, 255, 255, 0.09);
      border-color: #e63030;
      box-shadow: 0 0 0 3px rgba(230, 48, 48, 0.15);
    }

    /* Botão */
    button {
      width: 100%;
      padding: 14px;
      background: #e63030;
      color: #fff;
      border: none;
      border-radius: 3px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    button:hover {
      background: #ff3d3d;
      box-shadow: 0 4px 24px rgba(230, 48, 48, 0.45);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
      background: #cc2828;
    }

    button svg {
      width: 18px;
      height: 18px;
      transition: transform 0.2s;
    }

    button:hover svg {
      transform: translateX(4px);
    }

    /* Footer */
    .card-footer {
      padding: 12px 32px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-left {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.08em;
    }

    .footer-left strong {
      color: #e63030;
      font-weight: 500;
    }

    .footer-right {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.15);
    }

    @media (max-width: 480px) {
      .card-body { padding: 24px 20px 20px; }
      .card-footer { padding: 12px 20px; }
      .headline { font-size: 52px; }
    }
  </style>
</head>
<body>

  <!-- Fundo: floresta em movimento -->
  <div class="bg">
    <img
      src="rage.png"
      alt="floresta"
    >
  </div>

  <div class="card">




    <div class="card-body">

      <h1 class="headline">
        ACESSO<br><span class="red">LIVRE</span>
      </h1>
      <p class="tagline">informação não tem dono</p>

    
      <label class="input-label" for="url">→ endereço</label>
      <input
        type="text"
        id="url"
        placeholder="site.com"
        autocomplete="off"
        spellcheck="false"
      >

      <button id="btn" onclick="go()">
        Acessar agora
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>

    </div>

    <div class="card-footer">
      <span class="footer-left">status: <strong>online</strong></span>
      <span class="footer-right">v2.0 — cloudflare worker</span>
    </div>

  </div>

  <script>
    const WORKER = "https://quiet-river-77cb.ryangomesmelo123.workers.dev";

    function go() {
      const btn = document.getElementById("btn");
      let url = document.getElementById("url").value.trim();
      if (!url) return;
      if (!url.startsWith("http")) url = "https://" + url;

      btn.innerHTML = `
        Conectando...
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="animation:spin .7s linear infinite">
          <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
      `;
      btn.style.pointerEvents = "none";

      setTimeout(() => {
        window.location.href = WORKER + "?url=" + btoa(url);
      }, 500);
    }

    document.getElementById("url").addEventListener("keydown", e => {
      if (e.key === "Enter") go();
    });

    const s = document.createElement("style");
    s.textContent = "@keyframes spin { to { transform: rotate(360deg); } }";
    document.head.appendChild(s);
  </script>
</body>
</html>
