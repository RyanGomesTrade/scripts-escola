<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Livre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      background: #0a0a0a;
    }

    .bg { position: fixed; inset: 0; z-index: 0; }
    .bg img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center;
      display: block;
      filter: saturate(0.7) brightness(0.55);
    }
    .bg::after {
      content: ''; position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
      opacity: 0.35; pointer-events: none;
    }

    .wrapper {
      position: relative; z-index: 10;
      width: 100%; max-width: 440px; margin: 24px;
      animation: appear 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: rgba(10,10,10,0.82);
      border: 1px solid rgba(255,255,255,0.1);
      border-top: 3px solid #e63030;
      border-radius: 4px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      overflow: hidden;
    }

    .card-body { padding: 32px 32px 28px; }

    .headline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 64px; line-height: 0.92;
      letter-spacing: 0.01em; color: #fff; margin-bottom: 4px;
    }
    .headline .red { color: #e63030; }

    .tagline {
      font-family: 'DM Mono', monospace;
      font-size: 11px; color: rgba(255,255,255,0.3);
      letter-spacing: 0.12em; text-transform: uppercase;
      margin-bottom: 28px; margin-top: 8px;
    }

    .input-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: rgba(255,255,255,0.35); margin-bottom: 8px; display: block;
    }

    input[type="text"] {
      width: 100%; padding: 13px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 3px; color: #fff;
      font-family: 'DM Mono', monospace; font-size: 13px;
      outline: none; margin-bottom: 12px;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder { color: rgba(255,255,255,0.2); }
    input:focus {
      background: rgba(255,255,255,0.09);
      border-color: #e63030;
      box-shadow: 0 0 0 3px rgba(230,48,48,0.15);
    }
    input.filled {
      border-color: #e63030;
      box-shadow: 0 0 0 3px rgba(230,48,48,0.2);
      animation: filledFlash 0.5s ease;
    }
    @keyframes filledFlash {
      0%   { background: rgba(230,48,48,0.2); }
      100% { background: rgba(255,255,255,0.09); }
    }

    .btn-row { display: flex; gap: 8px; }

    .btn-main {
      flex: 1; padding: 14px;
      background: #e63030; color: #fff;
      border: none; border-radius: 3px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px; letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-main:hover { background: #ff3d3d; box-shadow: 0 4px 24px rgba(230,48,48,0.45); transform: translateY(-1px); }
    .btn-main:active { transform: translateY(0); background: #cc2828; }
    .btn-main svg { width: 18px; height: 18px; transition: transform 0.2s; }
    .btn-main:hover svg { transform: translateX(4px); }

    .btn-sites {
      padding: 0 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 3px;
      color: rgba(255,255,255,0.4);
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .btn-sites:hover {
      background: rgba(230,48,48,0.1);
      border-color: rgba(230,48,48,0.35);
      color: #e63030;
    }
    .btn-sites svg { width: 13px; height: 13px; }

    .card-footer {
      padding: 12px 32px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer-left {
      font-family: 'DM Mono', monospace; font-size: 10px;
      color: rgba(255,255,255,0.2); letter-spacing: 0.08em;
    }
    .footer-left strong { color: #e63030; font-weight: 500; }
    .footer-right { font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.15); }

    /* ── MODAL ── */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }

    .modal {
      width: 100%; max-width: 380px; margin: 20px;
      background: #111;
      border: 1px solid rgba(255,255,255,0.09);
      border-top: 2px solid #e63030;
      border-radius: 4px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.8);
      max-height: 75vh;
      display: flex; flex-direction: column; overflow: hidden;
      transform: translateY(14px) scale(0.98);
      transition: transform 0.25s cubic-bezier(0.22,1,0.36,1);
    }
    .modal-backdrop.open .modal { transform: translateY(0) scale(1); }

    .modal-header {
      padding: 14px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .modal-title {
      font-family: 'DM Mono', monospace; font-size: 9px;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }
    .modal-close {
      background: none; border: none; width: auto; padding: 2px 6px;
      color: rgba(255,255,255,0.25); font-size: 18px; line-height: 1;
      cursor: pointer; border-radius: 3px;
      transition: color 0.15s, background 0.15s;
      display: flex; align-items: center;
    }
    .modal-close:hover { color: #fff; background: rgba(255,255,255,0.08); box-shadow: none; transform: none; }
    .modal-close:active { transform: none; background: rgba(255,255,255,0.12); }

    .modal-list { overflow-y: auto; flex: 1; }
    .modal-list::-webkit-scrollbar { width: 3px; }
    .modal-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

    .modal-row {
      display: flex; align-items: center; gap: 14px;
      padding: 13px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.045);
      cursor: pointer;
      transition: background 0.12s;
    }
    .modal-row:last-child { border-bottom: none; }
    .modal-row:hover { background: rgba(230,48,48,0.08); }
    .modal-row:active { background: rgba(230,48,48,0.13); }

    .modal-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(255,255,255,0.1); flex-shrink: 0;
      transition: background 0.12s;
    }
    .modal-row:hover .modal-dot { background: #e63030; }

    .modal-info { flex: 1; min-width: 0; }
    .modal-name {
      font-family: 'DM Mono', monospace; font-size: 12px;
      color: rgba(255,255,255,0.7); margin-bottom: 2px;
      transition: color 0.12s;
    }
    .modal-row:hover .modal-name { color: #fff; }
    .modal-url {
      font-family: 'DM Mono', monospace; font-size: 9px;
      color: rgba(255,255,255,0.2);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .modal-arrow {
      color: rgba(255,255,255,0.12); font-size: 14px; flex-shrink: 0;
      transition: color 0.12s, transform 0.12s;
    }
    .modal-row:hover .modal-arrow { color: #e63030; transform: translateX(3px); }

    .modal-empty {
      padding: 44px 20px; text-align: center;
      font-family: 'DM Mono', monospace; font-size: 10px;
      color: rgba(255,255,255,0.15); letter-spacing: 0.08em; line-height: 1.8;
    }

    @media (max-width: 480px) {
      .card-body { padding: 24px 20px 20px; }
      .card-footer { padding: 12px 20px; }
      .headline { font-size: 52px; }
    }
  </style>
</head>
<body>

  <div class="bg">
    <img src="rage.png" alt="fundo">
  </div>

  <div class="wrapper">
    <div class="card">
      <div class="card-body">
        <h1 class="headline">ACESSO<br><span class="red">LIVRE</span></h1>
        <p class="tagline">informação não tem dono</p>

        <label class="input-label" for="url">→ endereço</label>
        <input type="text" id="url" placeholder="site.com" autocomplete="off" spellcheck="false">

        <div class="btn-row">
          <button class="btn-main" id="btn" onclick="go()">
            Acessar agora
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </button>
          <button class="btn-sites" onclick="openModal()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
              <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
            sites
          </button>
        </div>
      </div>

      <div class="card-footer">
        <span class="footer-left">status: <strong>online</strong></span>
        <span class="footer-right">v2.0 — cloudflare worker</span>
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal-backdrop" id="backdrop" onclick="backdropClick(event)">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">▸ sites salvos</span>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-list" id="modal-list"></div>
    </div>
  </div>

  <script>
    const WORKER = "https://quiet-river-77cb.ryangomesmelo123.workers.dev";

    // ══════════════════════════════════════════
    //  ADICIONE SEUS SITES AQUI
    //  { label: "Nome", url: "https://..." }
    // ══════════════════════════════════════════
    const SITES = [
          { label: "Taskitos", url: "https://taskitos.cupiditys.lol" },
          { label: "Scripts Em Geral", url: "https://doritosscript.com/#scripts" },
          { label: "Khan Academy", url: "https://khan.cupiditys.lol" },
    ];
    // ══════════════════════════════════════════

    function renderModal() {
      const list = document.getElementById('modal-list');
      if (SITES.length === 0) {
        list.innerHTML = '<div class="modal-empty">nenhum site na lista.<br>abra o arquivo e adicione em SITES[]</div>';
        return;
      }
      list.innerHTML = '';
      SITES.forEach(site => {
        const row = document.createElement('div');
        row.className = 'modal-row';
        row.innerHTML = `
          <span class="modal-dot"></span>
          <div class="modal-info">
            <div class="modal-name">${site.label}</div>
            <div class="modal-url">${site.url}</div>
          </div>
          <span class="modal-arrow">›</span>
        `;
        row.onclick = () => pick(site.url);
        list.appendChild(row);
      });
    }

    function pick(url) {
      const inp = document.getElementById('url');
      inp.value = url;
      inp.classList.add('filled');
      setTimeout(() => inp.classList.remove('filled'), 600);
      closeModal();
    }

    function openModal()  { document.getElementById('backdrop').classList.add('open'); }
    function closeModal() { document.getElementById('backdrop').classList.remove('open'); }
    function backdropClick(e) { if (e.target === document.getElementById('backdrop')) closeModal(); }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    function go() {
      const btn = document.getElementById('btn');
      let url = document.getElementById('url').value.trim();
      if (!url) return;
      if (!url.startsWith('http')) url = 'https://' + url;
      btn.innerHTML = `Conectando... <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;animation:spin .7s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>`;
      btn.style.pointerEvents = 'none';
      setTimeout(() => { window.location.href = WORKER + '?url=' + btoa(url); }, 500);
    }

    document.getElementById('url').addEventListener('keydown', e => { if (e.key === 'Enter') go(); });

    const s = document.createElement('style');
    s.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
    document.head.appendChild(s);

    renderModal();
  </script>
</body>
</html>
